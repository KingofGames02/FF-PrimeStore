<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Prime Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;900&family=Poppins:wght@600;700;800;900&family=Cairo:wght@600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #040d1f;
      --card-bg: #071932;
      --text: #e0e8f2;
      --accent: #FFD700;
      --border: rgba(255, 215, 0, 0.2);
      --radius: 16px;
      --font-en: 'Poppins', sans-serif;
      --font-ar: 'Cairo', sans-serif;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      color: var(--text);
      font-family: var(--font-en);
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: auto;
      width: 100vw;
      background: radial-gradient(circle at top, #1a3a6c 0%, #0d2752 25%, #051329 50%, #020813 75%, #010308 100%);
    }

    html[dir="rtl"] body { font-family: var(--font-ar); }

    .loader-container {
      position: fixed; inset: 0; background: rgba(4, 13, 31, 0.9);
      display: none; justify-content: center; align-items: center; z-index: 1000;
    }
    .loader {
      width: 50px; height: 50px; border: 5px solid rgba(255,215,0,0.2);
      border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    .is-loading { position: relative; overflow: hidden; }
    .is-loading::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(110deg, transparent 20%, rgba(255, 215, 0, 0.15) 50%, transparent 80%);
      background-size: 200% 100%; animation: shimmer 1.5s infinite linear; z-index: 5;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    #homePage {
      display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
      width: 100%; padding: 2vh 15px; max-width: 600px; margin: 0 auto; gap: 15px; min-height: 100vh;
    }

    #storePage {
      display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
      width: 100%; padding: 2vh 10px; max-width: 900px; margin: 0 auto; gap: 10px;
      background: url('assets/FF_UI_Prime_Bg.jpg') center/cover no-repeat;
      min-height: 100vh;
    }

    .header-container { text-align: center; width: 100%; display: flex; flex-direction: column; align-items: center; animation: fadeInDown 0.8s ease; }
    .main-title {
      font-family: 'Montserrat', sans-serif; font-size: clamp(2.2rem, 8vw, 3.5rem);
      font-weight: 900; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px;
      background: linear-gradient(to right, #fff, #FFD700, #fff);
      background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: titleShine 3s linear infinite; line-height: 1.1;
    }
    html[dir="rtl"] .main-title { letter-spacing: 0; font-family: var(--font-ar); }
    
    .sub-title { font-size: clamp(0.75rem, 3.5vw, 1.1rem); color: #ffffff; font-weight: 700; text-transform: uppercase; }
    html[dir="rtl"] .sub-title { font-family: var(--font-ar); }
    
    .lang-toggle-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 12px;
      padding: 6px 16px; margin-top: 10px; cursor: pointer; color: var(--accent); font-weight: 700;
      font-size: 0.85rem; transition: all 0.3s;
    }
    .lang-toggle-btn:hover { border-color: var(--accent); background: rgba(255, 215, 0, 0.1); transform: translateY(-2px); }

    .made-by {
      font-family: 'Montserrat', sans-serif; font-size: 1.1rem; font-weight: 800; color: #FFD700;
      text-align: center; animation: glowText 2s ease-in-out infinite alternate; 
      width: 100%; text-transform: uppercase; margin-top: auto; padding: 15px 0 5px 0;
    }
    html[dir="rtl"] .made-by { font-family: var(--font-en); letter-spacing: 1px; }

    @keyframes titleShine { to { background-position: 200% center; } }
    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes glowText { from { text-shadow: 0 0 5px rgba(255,215,0,0.3); } to { text-shadow: 0 0 15px rgba(255,215,0,0.9); } }

    .server-grid {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
      width: 100%; margin-top: 10px;
    }
    
    .server-btn {
      background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 215, 0, 0.15); color: #fff;
      padding: 12px 2px; border-radius: var(--radius); font-size: clamp(0.7rem, 2.5vw, 1rem); font-weight: 800; 
      font-family: 'Poppins', sans-serif; cursor: pointer; transition: all 0.3s;
      text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); min-height: 45px;
    }
    .server-btn:hover { background: rgba(255, 215, 0, 0.1); border-color: var(--accent); transform: translateY(-3px); color: var(--accent); }

    .social-card {
      background: linear-gradient(145deg, var(--card-bg), #030a17);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px; width: 100%; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      margin-top: 15px;
    }
    .card-title {
      font-size: 1.2rem; font-weight: 900; color: #FFD700;
      margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 8px;
      display: flex; align-items: center; gap: 8px;
    }
    .nav-grid { display: grid; grid-template-columns: 1fr; gap: 10px; width: 100%; }
    .btn-main {
      width: 100%; padding: 12px 20px; border-radius: 12px; border: 1px solid var(--border);
      background: rgba(255,255,255,0.05); color: #fff; text-decoration: none; font-weight: 800;
      display: flex; align-items: center; gap: 12px; font-size: 0.95rem; transition: all 0.3s;
    }
    html[dir="rtl"] .btn-main svg { margin-inline-end: 0; margin-inline-start: 12px; }
    .btn-main:hover { transform: translateY(-3px); border-color: var(--accent); color: var(--accent); }
    .btn-main.insta:hover { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); border-color: transparent; color: #fff; }
    .btn-main.tele:hover { background: #0088cc; border-color: transparent; color: #fff; }
    .btn-main.linktree:hover { background: #43E660; color: #000; border-color: transparent; }

    .store-header-card {
      display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(145deg, var(--card-bg), #051329);
      border: 1px solid var(--border); border-radius: 16px; padding: 10px 15px; 
      width: 100%; box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    }
    .server-badge-large {
      background: linear-gradient(135deg, #FFDF00 0%, #D4AF37 100%); color: #000; 
      font-size: 1rem; padding: 4px 15px; border-radius: 8px; font-weight: 900;
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.4); font-family: 'Poppins', sans-serif;
    }
    .back-btn {
      background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border);
      padding: 6px 12px; border-radius: 8px; cursor: pointer; font-weight: bold;
      transition: all 0.3s; font-family: inherit; display: flex; align-items: center; gap: 5px;
    }
    .back-btn:hover { background: var(--accent); color: #000; }

    .store-info-bar { display: flex; align-items: flex-end; justify-content: space-between; width: 100%; padding: 0 5px; }
    .store-title-text { 
      font-family: 'Montserrat', sans-serif; font-size: clamp(1.4rem, 5vw, 2.2rem); 
      font-weight: 900; text-transform: uppercase;
      background: linear-gradient(to right, #fff, #FFD700, #fff);
      background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: titleShine 3s linear infinite; line-height: 1.4; padding-bottom: 5px;
    }
    html[dir="rtl"] .store-title-text { font-family: var(--font-ar); }
    
    .timer-box {
      display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.6);
      border: 1px solid var(--border); padding: 5px 12px; border-radius: 20px;
      color: var(--accent); font-weight: bold; font-family: 'Poppins', sans-serif;
    }

    .store-wrapper-outer { position: relative; width: 100%; margin-top: 10px; display: block; }
    .store-image-box { position: relative; width: 100%; display: block; }
    .store-main-bg { width: 100%; height: auto; display: block; }
     #storePage .made-by {
      margin-top: 100px; 
      padding-top: 0;
    }
     #homePage .made-by {
      margin-top: 60px; 
      padding-top: 0;
    }
    
    .items-grid-overlay {
      position: absolute; top: 12.5%; bottom: 6%; left: 4.5%; right: 4.5%;
      overflow-y: auto; overflow-x: hidden; padding-right: 5px;
      display: grid; grid-template-columns: 1fr; gap: 10px; align-content: start;
    }
    .items-grid-overlay::-webkit-scrollbar { width: 4px; }
    .items-grid-overlay::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

    .item-card {
      position: relative; width: 100%; aspect-ratio: 3.17 / 1;
      cursor: pointer; transition: transform 0.2s ease; display: flex; align-items: center; justify-content: center;
    }
    .item-card:hover { transform: scale(1.02); filter: brightness(1.1); }
    .card-rarity-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: fill; z-index: 1; border-radius: 4px; }
    .card-icon { position: relative; z-index: 2; max-height: 85%; max-width: 60%; object-fit: contain; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5)); }
    
    .card-price-box {
      position: absolute; bottom: 8%; left: 5%; z-index: 3;
      display: flex; align-items: center; background: rgba(0,0,0,0.6);
      padding: 4px 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
    }
    .card-diamond { width: 18px; height: 18px; margin-inline-end: 6px; }
    .card-price { color: #fff; font-weight: bold; font-size: 1rem; font-family: 'Poppins', sans-serif;}

    .modal {
      display: none; position: fixed; z-index: 2000; inset: 0;
      width: 100%; height: 100%; background-color: rgba(2, 6, 15, 0.85);
      backdrop-filter: blur(5px); align-items: center; justify-content: center; padding: 20px;
    }
    .modal-content {
      background: rgba(7, 25, 50, 0.9); backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; 
      padding: 30px 25px; width: 100%; max-width: 450px;
      position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.6);
      animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .close-btn {
      position: absolute; top: 20px; inset-inline-end: 30px; color: #fff;
      font-size: 45px; cursor: pointer; font-weight: bold; transition: all 0.2s;
      z-index: 101; text-shadow: 0 4px 10px rgba(0,0,0,0.5); line-height: 0.8;
    }
    .close-btn:hover { color: #ef4444; transform: scale(1.1) rotate(90deg); }
    
    .modal-icon-container {
      width: 100%; height: 200px; display: flex; justify-content: center;
      align-items: center; margin-bottom: 25px; border-radius: var(--radius);
      background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.3) 100%);
      border: 1px dashed rgba(255,255,255,0.1);
    }
    .modal-float-wrapper {
      display: flex; justify-content: center; align-items: center; width: 100%; height: 100%;
      animation: floatWrapper 3s ease-in-out infinite;
    }
    @keyframes floatWrapper { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }

    .modal-icon { max-width: 180px; max-height: 180px; object-fit: contain; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.7)); }
    .modal-icon.weapon-tilt { transform: rotate(25deg) scale(1.4); }
    
    .modal-title { 
      text-align: center; margin-bottom: 20px; font-family: inherit; font-weight: 900;
      color: #fff; white-space: nowrap; width: 100%; padding-bottom: 5px;
    }
    .modal-details {
      background: rgba(0, 0, 0, 0.3); padding: 15px; border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.05); width: 100%;
    }
    .single-line-text {
      display: flex; align-items: center; white-space: nowrap;
      margin-bottom: 12px; padding-bottom: 4px; width: 100%;
    }
    .multi-line-text { margin-bottom: 0; line-height: 1.6; word-wrap: break-word; white-space: normal; display: block; }
    .modal-details strong { color: #fff; margin-inline-end: 8px; flex-shrink: 0; font-size: 0.95rem; }
    .modal-details span { color: #9cb8d6; font-size: 0.8rem; }
    
    html[dir="rtl"] .modal-details strong { font-size: 0.8rem; }
    html[dir="rtl"] .modal-details span { font-size: 0.75rem; }

    .copy-btn {
      background: transparent; border: none; color: var(--accent);
      margin-inline-start: 8px; cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
      padding: 4px; border-radius: 4px;
    }
    .copy-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

    @keyframes modalPop { 0% { transform: scale(0.85); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  </style>
</head>
<body>

  <div id="loader" class="loader-container"><div class="loader"></div></div>

  <div id="homePage">
    <div class="header-container">
      <h1 class="main-title">Prime Store</h1>
      <div class="sub-title" data-en="EXPLORE PRIME STORE ON ALL SERVERS" data-ar="استكشف متجر برايم في جميع السيرفرات">EXPLORE PRIME STORE ON ALL SERVERS</div>
      <div class="lang-toggle-btn" onclick="toggleLanguage()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></svg>
        <span id="langText">ARABIC</span>
      </div>
    </div>
    
    <div class="server-grid" id="serverGrid"></div>

    <div class="social-card">
      <div class="card-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:24px; height:24px;"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
        <span data-en="Follow Me" data-ar="تابعني">Follow Me</span>
      </div>
      <div class="nav-grid">
        <a href="https://www.instagram.com/_kingofgames02" target="_blank" class="btn-main insta">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:22px; height:22px;"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
          <span style="flex:1;">Instagram</span>
        </a>
        <a href="https://t.me/FF_MENA_Updates" target="_blank" class="btn-main tele">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:22px; height:22px;"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
          <span style="flex:1;">Telegram</span>
        </a>
        <a href="https://linktr.ee/KingofGames02" target="_blank" class="btn-main linktree">
          <svg fill="currentColor" viewBox="0 0 24 24" style="width:22px; height:22px;"><path d="m13.73635 5.85251 4.00467-4.11665 2.3248 2.3808-4.20064 4.00466h5.9085v3.30473h-5.9365l4.22865 4.10766-2.3248 2.3338L12.0005 12.099l-5.74052 5.76852-2.3248-2.3248 4.22864-4.10766h-5.9375V8.12132h5.9085L3.93417 4.11666l2.3248-2.3808 4.00468 4.11665V0h3.4727zm-3.4727 10.30614h3.4727V24h-3.4727z"/></svg>
          <span style="flex:1;">Linktree</span>
        </a>
      </div>
    </div>

    <div class="made-by">Made By King of Games</div>
  </div>

  <div id="storePage" style="display: none;">
    <div class="store-header-card">
      <button class="back-btn" onclick="showServers()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        <span id="backBtnText" data-en="Back" data-ar="رجوع">Back</span>
      </button>
      <div class="header-right">
        <span class="server-badge-large" id="currentServerBadge">--</span>
      </div>
    </div>

    <div class="store-info-bar">
      <div class="store-title-text" data-en="PRIME STORE" data-ar="متجر برايم">PRIME STORE</div>
      <div class="timer-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
        <span id="countdownTimer">Loading...</span>
      </div>
    </div>

    <div class="store-wrapper-outer">
      <div class="store-image-box">
        <img src="assets/FF_UI_Prime_Store.png" class="store-main-bg" alt="Store Frame">
        <div class="items-grid-overlay" id="itemsGrid"></div>
      </div>
    </div>

    <div class="made-by">Made By King of Games</div>
  </div>

  <div id="itemModal" class="modal">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <div class="modal-content">
      <div class="modal-icon-container" id="modalIconContainer">
        <div class="modal-float-wrapper">
          <img id="modalIcon" src="" class="modal-icon" alt="icon">
        </div>
      </div>
      <h2 class="modal-title" id="modalName"></h2>
      <div class="modal-details">
        <div class="single-line-text">
          <strong data-en="Item id:" data-ar="معرف العنصر:">Item id:</strong> <span id="modalId"></span>
          <button class="copy-btn" id="btnCopyId" onclick="copyItemId()">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
          </button>
        </div>
        <div class="single-line-text"><strong data-en="Icon id:" data-ar="معرف الأيقونة:">Icon id:</strong> <span id="modalIconId"></span></div>
        <div class="multi-line-text"><strong data-en="Description:" data-ar="الوصف:">Description:</strong> <span id="modalDesc"></span></div>
      </div>
    </div>
  </div>

  <script>
    const servers = ['PK', 'IND', 'BR', 'ME', 'NA', 'VN', 'ID', 'SG', 'BD', 'TW', 'TH', 'CIS', 'EU', 'SAC', 'US'];
    const apiUrl = 'https://kog-primestore.vercel.app/get_prime_store';
    
    let libraryData = [];
    let updatedIcons = new Set();
    let timerInterval;
    let currentModalItemId = ""; 
    let currentLang = 'en';

    const copyIconSVG = `<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>`;
    const checkIconSVG = `<svg width="18" height="18" fill="none" stroke="#10b981" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>`;

    const rarityToBg = {
      "COMMON": "1", "UNCOMMON": "2", "RARE": "3", "EPIC": "4",
      "EPIC++": "5", "MYTHIC": "6", "MYTHIC++": "7", "ARTIFACT": "8"
    };

    const rarityMap = {
      "White": "COMMON", "Green": "UNCOMMON", "Blue": "RARE", "Purple": "EPIC",
      "Orange": "MYTHIC", "Red": "ARTIFACT", "Purple_Plus": "EPIC++", "Orange_Plus": "MYTHIC++"
    };

    function updateUILanguage() {
      document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
      document.getElementById('langText').innerText = currentLang === 'en' ? 'ARABIC' : 'ENGLISH';
      document.querySelectorAll('[data-en]').forEach(el => {
        el.innerText = el.getAttribute(`data-${currentLang}`);
      });
    }

    async function fetchLibraryData() {
      const fileName = currentLang === 'en' ? 'ItemsData_en.json' : 'ItemsData_ar.json';
      try {
        const [dataRes, iconsRes] = await Promise.all([
          fetch(`https://raw.githubusercontent.com/KingofGames02/Free-Fire-Items-Library/main/${fileName}`),
          fetch('https://raw.githubusercontent.com/KingofGames02/Free-Fire-Items-Library/main/updated_icons.json')
        ]);
        if(dataRes.ok) libraryData = await dataRes.json();
        if(iconsRes.ok) updatedIcons = new Set(await iconsRes.json());
      } catch(e) {}
    }

    async function toggleLanguage() {
      document.getElementById('loader').style.display = 'flex';
      currentLang = currentLang === 'en' ? 'ar' : 'en';
      
      const urlParams = new URLSearchParams(window.location.search);
      urlParams.set('lang', currentLang);
      window.history.replaceState({}, '', `${window.location.pathname}?${urlParams.toString()}`);

      updateUILanguage();
      await fetchLibraryData();
      
      if(document.getElementById('storePage').style.display === 'flex') {
        const activeServer = document.getElementById('currentServerBadge').textContent;
        await loadStore(activeServer);
      }
      document.getElementById('loader').style.display = 'none';
    }

    async function init() {
      const urlParams = new URLSearchParams(window.location.search);
      const langParam = urlParams.get('lang');
      if (langParam === 'en' || langParam === 'ar') currentLang = langParam;
      
      updateUILanguage();

      const grid = document.getElementById('serverGrid');
      servers.forEach(s => {
        const btn = document.createElement('button');
        btn.className = 'server-btn';
        btn.textContent = s;
        btn.onclick = () => loadStore(s);
        grid.appendChild(btn);
      });

      await fetchLibraryData();
    }

    async function loadStore(server) {
      document.getElementById('loader').style.display = 'flex';
      try {
        const res = await fetch(`${apiUrl}?server=${server}&language=${currentLang}`);
        if(!res.ok) throw new Error();
        const data = await res.json();
        
        document.getElementById('currentServerBadge').textContent = server;
        renderStore(data);
        
        document.getElementById('homePage').style.display = 'none';
        document.getElementById('storePage').style.display = 'flex';
      } catch(e) {} finally {
        document.getElementById('loader').style.display = 'none';
      }
    }

    function showServers() {
      clearInterval(timerInterval);
      document.getElementById('storePage').style.display = 'none';
      document.getElementById('homePage').style.display = 'flex';
    }

    function renderStore(data) {
      const itemsContainer = document.getElementById('itemsGrid');
      itemsContainer.innerHTML = '';
      
      if(data.primeStoreDesc && data.primeStoreDesc.endTimestamp) {
        startTimer(data.primeStoreDesc.endTimestamp);
      }

      if(!data.primeStoreItems) return;

      // ترتيب العناصر حسب المفتاح sortId
      data.primeStoreItems.sort((a, b) => a.sortId - b.sortId);

      data.primeStoreItems.forEach(apiItem => {
        const idStr = apiItem.itemId.toString();
        let libItem = libraryData.find(i => i.Id.toString() === idStr) || { Id: idStr, Name: `Unknown Item (${idStr})`, Desc: currentLang === 'en' ? "No description available." : "لا يوجد وصف متاح." };
        
        let mappedRarity = rarityMap[libItem.Rare] || libItem.Rare || "COMMON";
        let bgNum = rarityToBg[mappedRarity] || "1";
        
        const iconId = libItem.Icon ? libItem.Icon.toString() : idStr;
        const iconSuffix = updatedIcons.has(iconId) ? "_2" : "";
        const iconUrl = `https://raw.githubusercontent.com/KingofGames02/Free-Fire-Items-Library/main/ff-icons/${iconId}${iconSuffix}.png`;
        const fallbackIconUrl = `https://raw.githubusercontent.com/KingofGames02/Free-Fire-Items-Library/main/ff-icons/${idStr}.png`;

        const card = document.createElement('div');
        card.className = 'item-card';
        card.onclick = () => openModal(libItem, iconUrl, fallbackIconUrl);
        
        card.innerHTML = `
          <img src="assets/FF_UI_Prime_Item${bgNum}.png" class="card-rarity-bg" alt="Rarity BG" onerror="this.src='assets/FF_UI_Prime_Item1.png'">
          <img src="${iconUrl}" class="card-icon" onerror="this.onerror=null; this.src='${fallbackIconUrl}';">
          <div class="card-price-box">
            <img src="assets/icon-diamond.png" class="card-diamond" alt="dia">
            <span class="card-price">${apiItem.gemsPrice}</span>
          </div>
        `;
        itemsContainer.appendChild(card);
      });
    }

    function openModal(libItem, primaryUrl, fallbackUrl) {
      currentModalItemId = libItem.Id.toString(); 
      
      // المنطق البرمجي الدقيق لتصغير حجم النصوص بناءً على طولها (مثل مكتبة العناصر)
      const nameStr = libItem.Name || (currentLang === 'en' ? "No name available." : "لا يوجد اسم متاح.");
      const modalNameEl = document.getElementById('modalName');
      modalNameEl.textContent = nameStr;
      let nameLen = nameStr.length;
      if (nameLen < 25) modalNameEl.style.fontSize = '0.95rem';
      else if (nameLen < 35) modalNameEl.style.fontSize = '0.85rem';
      else if (nameLen < 45) modalNameEl.style.fontSize = '0.75rem';
      else modalNameEl.style.fontSize = '0.65rem';

      const modalIdEl = document.getElementById('modalId');
      modalIdEl.textContent = libItem.Id;
      let idLen = libItem.Id.toString().length;
      if (idLen < 15) modalIdEl.style.fontSize = '0.8rem';
      else if (idLen < 25) modalIdEl.style.fontSize = '0.7rem';
      else modalIdEl.style.fontSize = '0.6rem';
      
      const iconStr = libItem.Icon ? libItem.Icon.toString() : libItem.Id.toString();
      const modalIconIdEl = document.getElementById('modalIconId');
      modalIconIdEl.textContent = iconStr;
      let iconLen = iconStr.length;
      if (iconLen < 20) modalIconIdEl.style.fontSize = '0.8rem';
      else if (iconLen < 30) modalIconIdEl.style.fontSize = '0.7rem';
      else if (iconLen < 40) modalIconIdEl.style.fontSize = '0.6rem';
      else if (iconLen < 50) modalIconIdEl.style.fontSize = '0.5rem';
      else modalIconIdEl.style.fontSize = '0.45rem';

      document.getElementById('modalDesc').textContent = libItem.Desc || (currentLang === 'en' ? "No description available." : "لا يوجد وصف متاح.");
      
      document.getElementById('btnCopyId').innerHTML = copyIconSVG;

      const iconEl = document.getElementById('modalIcon');
      const iconContainer = document.getElementById('modalIconContainer');
      
      iconContainer.classList.add('is-loading');
      iconEl.className = 'modal-icon';
      iconEl.style.opacity = '0';
      iconEl.style.transition = 'opacity 0.3s ease';
      
      iconEl.src = primaryUrl;
      iconEl.onerror = function() {
        this.onerror = null;
        this.src = fallbackUrl;
      };
      iconEl.onload = function() {
        iconContainer.classList.remove('is-loading');
        this.style.opacity = '1';
        if(this.naturalWidth === 300 && this.naturalHeight === 90) {
          this.classList.add('weapon-tilt');
        }
      }
      
      document.getElementById('itemModal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('itemModal').style.display = 'none';
      currentModalItemId = "";
    }

    function copyItemId() {
      if (!currentModalItemId) return;
      navigator.clipboard.writeText(currentModalItemId).then(() => {
        const copyBtn = document.getElementById('btnCopyId');
        copyBtn.innerHTML = checkIconSVG;
        setTimeout(() => { copyBtn.innerHTML = copyIconSVG; }, 2000);
      });
    }

    window.onclick = function(event) {
      if (event.target === document.getElementById('itemModal')) closeModal();
    }

    function startTimer(endTimestamp) {
      clearInterval(timerInterval);
      const timerEl = document.getElementById('countdownTimer');
      
      const update = () => {
        const now = Math.floor(Date.now() / 1000);
        const diff = endTimestamp - now;
        
        if(diff <= 0) {
          timerEl.textContent = 'Expired';
          clearInterval(timerInterval);
          return;
        }
        
        const d = Math.floor(diff / (24 * 3600));
        const h = Math.floor((diff % (24 * 3600)) / 3600);
        const m = Math.floor((diff % 3600) / 60);
        
        timerEl.textContent = `${d}d ${h}h ${m}m`;
      };
      
      update();
      timerInterval = setInterval(update, 60000);
    }

    init();
  </script>
</body>
</html>
